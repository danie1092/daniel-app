<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daniel Assistant</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
body{
font-family:-apple-system,Noto Sans KR;
background:#f7f7f5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
width:320px;
}

button{
background:black;
color:white;
border:none;
padding:14px;
border-radius:14px;
font-weight:700;
width:100%;
cursor:pointer;
}

.user{
display:none;
}

.logout{
margin-top:10px;
background:#eee;
color:black;
}
</style>

</head>

<body>

<div class="card" id="login">
<h2>다니엘 어시스턴트</h2>

<button onclick="login()">
Google 로그인
</button>

</div>

<div class="card user" id="app">

<h3 id="name"></h3>

<p>로그인 성공</p>

<button class="logout" onclick="logout()">
로그아웃
</button>

</div>


<script>

const SUPABASE_URL="https://ksrvkezznejsnqjkuezi.supabase.co"

const SUPABASE_KEY="sb_publishable_3yAUPpBWBl1L0Lm-2tOZkg_wbI1MTOC"

const {createClient}=supabase

const sb=createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function login(){

await sb.auth.signInWithOAuth({

provider:"google",

options:{
redirectTo:window.location.origin
}

})

}

async function logout(){

await sb.auth.signOut()

showLogin()

}

function showLogin(){

document.getElementById("login").style.display="block"

document.getElementById("app").style.display="none"

}

function showApp(user){

document.getElementById("login").style.display="none"

document.getElementById("app").style.display="block"

document.getElementById("name").innerText=user.email

}

async function check(){

const {data}=await sb.auth.getSession()

if(data.session){

showApp(data.session.user)

}else{

showLogin()

}

}

check()

sb.auth.onAuthStateChange((event,session)=>{

if(session){

showApp(session.user)

}else{

showLogin()

}

})

</script>

</body>

</html>
