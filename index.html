<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="다니엘" />
  <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f0f0e" media="(prefers-color-scheme: dark)" />
  <title>다니엘 어시스턴트</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f0f0ed;
      --text: #111;
      --text2: #777;
      --border: #e4e4e0;
      --blue: #4a7dff;
      --yellow: #f5a623;
      --orange: #ff5e3a;
      --radius: 14px;
      --nav-h: 72px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f0e;
        --surface: #1a1a18;
        --surface2: #222220;
        --text: #f0f0ee;
        --text2: #666;
        --border: #2c2c2a;
      }
    }
    body { background: var(--bg); font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: var(--text); }
    input, textarea, button { font-family: inherit; }
    input, textarea { background: none; border: none; outline: none; color: var(--text); width: 100%; }
    button { cursor: pointer; border: none; background: none; color: var(--text); }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom)); }
    .header { padding: 20px 20px 0; }
    .header-date { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
    .header-title { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .content { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: var(--surface); border-radius: var(--radius); padding: 16px; }
    .card-label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--text2); margin-bottom: 10px; }
    .fortune-card { background: var(--surface); border-radius: var(--radius); padding: 16px; border-left: 3px solid var(--blue); }
    .pill { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); color: var(--text2); display: inline-block; }
    .input-row { display: flex; gap: 8px; align-items: center; }
    .input-field { flex: 1; font-size: 14px; padding: 10px 12px; border-radius: 10px; background: var(--surface2); }
    .btn-primary { font-size: 13px; font-weight: 700; color: var(--bg); background: var(--text); padding: 9px 18px; border-radius: 20px; white-space: nowrap; }
    .btn-ghost { font-size: 12px; color: var(--text2); padding: 5px 10px; border-radius: 10px; background: var(--surface2); }
    .btn-icon { font-size: 16px; color: var(--text2); padding: 4px 6px; line-height: 1; }
    .briefing-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .briefing-row:last-child { border-bottom: none; }
    .sched-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .sched-item:last-child { border-bottom: none; padding-bottom: 0; }
    .sched-bar { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
    .sched-title { font-size: 14px; font-weight: 600; }
    .sched-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .memo-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .memo-item:last-child { border-bottom: none; padding-bottom: 0; }
    .memo-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .memo-text { font-size: 14px; line-height: 1.6; }
    .memo-date { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .todo-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; border-radius: 10px; background: var(--surface2); margin-bottom: 6px; }
    .todo-text { font-size: 14px; line-height: 1.5; flex: 1; }
    .todo-done .todo-text { text-decoration: line-through; color: var(--text2); }
    .todo-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .cat-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .cat-pill { font-size: 12px; padding: 5px 12px; border-radius: 20px; font-weight: 600; transition: all 0.1s; }
    .cat-pill.active { background: var(--text); color: var(--bg); }
    .cat-pill.inactive { background: var(--surface2); color: var(--text2); }
    .search-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); border-radius: 10px; margin-bottom: 10px; }
    .search-input { font-size: 13px; flex: 1; }
    .empty { font-size: 13px; color: var(--text2); text-align: center; padding: 16px 0; }
    .err { font-size: 12px; color: var(--orange); margin-top: 4px; }
    .hint { font-size: 11px; color: var(--text2); margin-top: 4px; }
    .color-legend { display: flex; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
    .legend-label { font-size: 11px; color: var(--text2); }
    .section-header { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
    .todo-from { font-size: 10px; background: var(--border); color: var(--text2); padding: 1px 6px; border-radius: 6px; margin-left: 4px; }
    .divider { height: 1px; background: var(--border); margin: 10px 0; }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-direction: column; gap: 12px; }
    .nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: flex-start; padding-top: 10px; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 0; color: var(--text2); }
    .nav-btn.active { color: var(--text); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade { animation: fadeIn 0.2s ease; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <p class="header-date" id="headerDate"></p>
    <h1 class="header-title" id="headerTitle"></h1>
  </div>

  <div class="content">
    <!-- 홈 -->
    <div id="tab-home" class="tab-content active fade">
      <div class="fortune-card">
        <p class="card-label" style="color: var(--blue); margin-bottom: 6px;">오늘의 운세</p>
        <p style="font-size: 14px; line-height: 1.7;" id="fortuneText"></p>
      </div>

      <!-- 포커스 -->
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <p class="card-label" style="margin-bottom:0;">🎯 오늘의 포커스</p>
          <span style="font-size:11px; color:var(--text2);" id="focusCount">0/3</span>
        </div>
        <div id="focusList"></div>
        <div id="focusInputArea" style="display:flex; gap:8px; margin-top:8px;">
          <input id="focusInput" class="input-field" placeholder="오늘 가장 중요한 일은?" style="font-size:13px; padding:8px 10px;" onkeydown="if(event.key==='Enter') addFocus()" />
          <button class="btn-primary" onclick="addFocus()" style="font-size:12px; padding:8px 14px;">+</button>
        </div>
        <p id="focusMsg" style="font-size:13px; text-align:center; margin-top:8px; display:none;"></p>
      </div>

      <!-- 오늘 일정 -->
      <div class="card">
        <p class="card-label">📅 오늘 일정</p>
        <div id="homeTodayScheds"><p class="empty">오늘 일정이 없어요</p></div>
      </div>

      <!-- ASAP -->
      <div class="card" id="homeAsapCard" style="display:none;">
        <p class="card-label" style="color:var(--orange);">🔥 ASAP</p>
        <div id="homeAsapList"></div>
      </div>

      <!-- 매출 -->
      <div class="card">
        <p class="card-label">💰 매출 현황</p>
        <div id="salesBox">
          <p class="empty">매출 데이터를 불러오는 중...</p>
        </div>
      </div>

      <!-- 최근 메모 -->
      <div class="card" id="homeRecentMemoCard" style="display:none;">
        <p class="card-label">📝 최근 메모</p>
        <div id="homeRecentMemos"></div>
      </div>
    </div>

    <!-- 일정 -->
    <div id="tab-schedule" class="tab-content fade">
      <div class="card">
        <p class="card-label">일정 추가</p>
        <div class="input-row">
          <input id="schedInput" class="input-field" placeholder="내일 10:00 PT상담" onkeydown="if(event.key==='Enter') addSchedule()" />
          <button class="btn-primary" onclick="addSchedule()">추가</button>
        </div>
        <p class="err" id="schedErr" style="display:none;"></p>
        <p class="hint">오늘 · 내일 · 모레 · 이번주 금요일 · 다음주 토요일 · MM-DD</p>
        <div class="color-legend">
          <div style="display:flex;align-items:center;gap:4px;"><div class="legend-dot" style="background:var(--blue)"></div><span class="legend-label">개인</span></div>
          <div style="display:flex;align-items:center;gap:4px;"><div class="legend-dot" style="background:var(--yellow)"></div><span class="legend-label">업무</span></div>
          <div style="display:flex;align-items:center;gap:4px;"><div class="legend-dot" style="background:var(--orange)"></div><span class="legend-label">긴급</span></div>
        </div>
      </div>
      <div class="card" id="todaySchedCard" style="display:none;">
        <p class="card-label">오늘</p>
        <div id="todaySchedList"></div>
      </div>
      <div class="card" id="upcomingSchedCard" style="display:none;">
        <p class="card-label">예정</p>
        <div id="upcomingSchedList"></div>
      </div>
      <p class="empty" id="schedEmpty">등록된 일정이 없어요</p>
    </div>

    <!-- 메모 -->
    <div id="tab-memo" class="tab-content fade">
      <div class="search-row">
        <span style="font-size:14px;">🔍</span>
        <input class="search-input" id="memoSearch" placeholder="메모 검색..." oninput="renderMemos()" />
        <button class="btn-icon" onclick="document.getElementById('memoSearch').value=''; renderMemos()">×</button>
      </div>
      <div class="card">
        <p class="card-label">메모 추가</p>
        <div class="cat-pills" id="memoCatPills"></div>
        <textarea id="memoInput" placeholder="내용 입력... (할 일 관련 메모는 자동으로 할 일에 추가돼요)" rows="3" style="font-size:14px; line-height:1.6; padding:8px 0; border-bottom:1px solid var(--border); resize:none; margin-bottom:10px;"></textarea>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <button id="pinBtn" onclick="toggleMemoPin()" style="font-size:13px; color:var(--text2); display:flex; align-items:center; gap:4px;">☆ 고정</button>
          <button class="btn-primary" onclick="addMemo()">저장</button>
        </div>
      </div>
      <div class="card" id="memoListCard" style="display:none;">
        <div id="memoList"></div>
      </div>
      <p class="empty" id="memoEmpty">저장된 메모가 없어요</p>
    </div>

    <!-- 할 일 -->
    <div id="tab-todo" class="tab-content fade">
      <div class="card">
        <p class="card-label">할 일 추가</p>
        <div class="cat-pills" id="todoPriorityPills"></div>
        <div class="input-row">
          <input id="todoInput" class="input-field" placeholder="할 일 입력..." onkeydown="if(event.key==='Enter') addTodo()" />
          <button class="btn-primary" onclick="addTodo()">추가</button>
        </div>
      </div>
      <div id="asapSection" style="display:none;">
        <div class="section-header">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--orange);"></div>
          <span style="font-size:12px;font-weight:800;letter-spacing:0.5px;color:var(--orange);">ASAP</span>
          <span style="font-size:11px;color:var(--text2);" id="asapCount"></span>
        </div>
        <div id="asapList"></div>
      </div>
      <div id="activeSection" style="display:none;">
        <div class="section-header">
          <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);"></div>
          <span style="font-size:12px;font-weight:800;letter-spacing:0.5px;color:var(--blue);">진행중</span>
          <span style="font-size:11px;color:var(--text2);" id="activeCount"></span>
        </div>
        <div id="activeList"></div>
      </div>
      <div id="doneSection" style="display:none;">
        <div class="section-header">
          <div style="width:8px;height:8px;border-radius:50%;background:#aaa;"></div>
          <span style="font-size:12px;font-weight:800;letter-spacing:0.5px;color:var(--text2);">완료</span>
          <span style="font-size:11px;color:var(--text2);" id="doneCount"></span>
        </div>
        <div id="doneList"></div>
      </div>
      <p class="empty" id="todoEmpty">할 일이 없어요 🎉</p>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="nav-home">
      <span class="nav-icon">⌂</span><span class="nav-label">홈</span>
    </button>
    <button class="nav-btn" onclick="switchTab('schedule')" id="nav-schedule">
      <span class="nav-icon">◫</span><span class="nav-label">일정</span>
    </button>
    <button class="nav-btn" onclick="switchTab('memo')" id="nav-memo">
      <span class="nav-icon">◪</span><span class="nav-label">메모</span>
    </button>
    <button class="nav-btn" onclick="switchTab('todo')" id="nav-todo">
      <span class="nav-icon">✓</span><span class="nav-label">할 일</span>
    </button>
  </nav>
</div>

<script>
const FORTUNES = [
  "오늘은 작은 결단이 큰 변화를 만드는 날이에요.",
  "주변 사람들과의 대화에서 뜻밖의 아이디어를 얻을 수 있어요.",
  "오늘 흘린 땀은 내일의 자신감이 될 거예요.",
  "작은 친절이 큰 인연을 만드는 날이에요.",
  "오늘은 직감을 믿어보세요. 생각보다 정확할 거예요.",
  "새로운 시도가 좋은 결과를 가져오는 날이에요.",
  "계획한 일들이 순조롭게 풀리는 날이에요.",
  "오늘은 에너지가 넘치는 날이에요.",
  "잠시 멈추고 주변을 돌아보면 기회가 보일 거예요.",
  "오늘의 노력은 반드시 좋은 결실로 돌아올 거예요.",
  "오늘은 몸과 마음을 충전하는 날로 삼아봐요.",
  "마음먹은 대로 이루어지는 날이에요.",
  "뜻밖의 행운이 찾아오는 날이에요.",
  "진심 어린 노력은 반드시 누군가에게 닿아요.",
  "오늘의 선택이 미래의 나를 만들어요.",
  "오늘은 창의적인 아이디어가 떠오르기 좋은 날이에요.",
  "오늘은 결단력이 강해지는 날이에요.",
  "한 걸음 한 걸음이 모여 큰 성과가 되는 날이에요.",
  "오늘 다니엘의 노력이 주변에 좋은 영향을 줄 거예요 💪",
  "막혔던 일이 오늘을 기점으로 풀리기 시작할 거예요.",
];
const WORK_KW = ["PT","상담","센터","면담","교육","보고","본사","회의","미팅","트레이너"];
const URGENT_KW = ["긴급","필수","ASAP","asap"];
const TODO_KW = ["해야","할 것","확인","연락","준비","처리","결제","예약"];
const DAY_MAP = {일:0,월:1,화:2,수:3,목:4,금:5,토:6};
const COLOR = {personal:"#4a7dff",work:"#f5a623",urgent:"#ff5e3a"};
const COLOR_LABEL = {personal:"개인",work:"업무",urgent:"긴급"};

let schedules = JSON.parse(localStorage.getItem('schedules')||'[]');
const CALENDAR_WEBHOOK_URL = 'https://danielham.app.n8n.cloud/webhook/get-events';
const SALES_WEBHOOK_URL = 'https://danielham.app.n8n.cloud/webhook/get-sales';

async function fetchGoogleCalendar() {
  try {
    const res = await fetch(CALENDAR_WEBHOOK_URL);
    const data = await res.json();
    if (data.events) {
      const googleEvents = data.events.map(e => ({
        id: 'google_' + e.start,
        title: e.title,
        date: new Date(e.start).toISOString(),
        hour: new Date(e.start).getHours(),
        minute: new Date(e.start).getMinutes(),
        color: e.color === '5' ? 'work' : e.color === '6' ? 'urgent' : 'personal',
        fromGoogle: true
      }));
      schedules = [...schedules.filter(s => !s.fromGoogle), ...googleEvents];
      renderAll();
    }
  } catch(e) {
    console.log('캘린더 불러오기 실패:', e);
  }
}

async function loadSales() {
  try {
    const res = await fetch(SALES_WEBHOOK_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();

    const salesEl = document.getElementById('salesBox');
    if (!salesEl) return;

    salesEl.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="font-size:13px; font-weight:700;">응암점</span>
        <button onclick="loadSales()" style="font-size:11px; color:var(--text2); padding:3px 8px; border-radius:8px; background:var(--surface2);">↻ 새로고침</button>
      </div>

      <div style="display:flex; gap:12px; margin-bottom:10px;">
        <div style="flex:1; background:var(--surface2); border-radius:10px; padding:10px;">
          <p style="font-size:10px; color:var(--text2); font-weight:700; margin-bottom:8px;">헬스</p>
          <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
            <span style="font-size:12px; color:var(--text2);">신규</span>
            <span style="font-size:13px; font-weight:700;">${data.healthNew || 0}명</span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:12px; color:var(--text2);">재등록</span>
            <span style="font-size:13px; font-weight:700;">${data.healthRenewal || 0}명</span>
          </div>
        </div>
        <div style="flex:1; background:var(--surface2); border-radius:10px; padding:10px;">
          <p style="font-size:10px; color:var(--text2); font-weight:700; margin-bottom:8px;">PT</p>
          <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
            <span style="font-size:12px; color:var(--text2);">신규</span>
            <span style="font-size:13px; font-weight:700;">${data.ptNew || 0}명</span>
          </div>
          <div style="display:flex; justify-content:space-between;">
            <span style="font-size:12px; color:var(--text2);">재등록</span>
            <span style="font-size:13px; font-weight:700;">${data.ptRenewal || 0}명</span>
          </div>
        </div>
      </div>

      <div style="border-top:1px solid var(--border); padding-top:10px;">
        <p style="font-size:10px; color:var(--text2); font-weight:700; margin-bottom:6px;">이번달 누계</p>
        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
          <span style="font-size:12px; color:var(--text2);">회원권</span>
          <span style="font-size:13px; font-weight:700;">${Number(data.healthTotal||0).toLocaleString()}원</span>
        </div>
        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
          <span style="font-size:12px; color:var(--text2);">PT</span>
          <span style="font-size:13px; font-weight:700;">${Number(data.ptTotal||0).toLocaleString()}원</span>
        </div>
        <div style="display:flex; justify-content:space-between; padding-top:6px; border-top:1px solid var(--border);">
          <span style="font-size:12px; font-weight:700;">총합계</span>
          <span style="font-size:14px; font-weight:800; color:var(--blue);">${Number(data.grandTotal||0).toLocaleString()}원</span>
        </div>
      </div>
    `;
  } catch (e) {
    console.log('매출 불러오기 실패:', e);
    const salesEl = document.getElementById('salesBox');
    if (salesEl) {
      salesEl.innerHTML = `<p class="empty">매출 데이터를 불러오지 못했어요</p>`;
    }
  }
}

fetchGoogleCalendar();
loadSales();

setInterval(fetchGoogleCalendar, 5 * 60 * 1000);
setInterval(loadSales, 5 * 60 * 1000);

let memos = JSON.parse(localStorage.getItem('memos')||'[]');
let todos = JSON.parse(localStorage.getItem('todos')||'[]');
let focuses = JSON.parse(localStorage.getItem('focuses')||'[]');
let memoCat = '일반';
let memoPin = false;
let todoPriority = '진행중';
let currentTab = 'home';

function save() {
  localStorage.setItem('schedules', JSON.stringify(schedules));
  localStorage.setItem('memos', JSON.stringify(memos));
  localStorage.setItem('todos', JSON.stringify(todos));
  localStorage.setItem('focuses', JSON.stringify(focuses));
}

function getColorId(text) {
  if (URGENT_KW.some(k=>text.includes(k))) return 'urgent';
  if (WORK_KW.some(k=>text.includes(k))) return 'work';
  return 'personal';
}
function hasTodoIntent(text) { return TODO_KW.some(k=>text.includes(k)); }

function parseNaturalDate(input) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dow = today.getDay();
  if (input.startsWith('오늘')) return {date:today, rest:input.slice(2).trim()};
  if (input.startsWith('내일')) { const d=new Date(today); d.setDate(d.getDate()+1); return {date:d, rest:input.slice(2).trim()}; }
  if (input.startsWith('모레')) { const d=new Date(today); d.setDate(d.getDate()+2); return {date:d, rest:input.slice(2).trim()}; }
  const nw = input.match(/^다음\s*주\s*([일월화수목금토])요일\s*/);
  if (nw) { const t=DAY_MAP[nw[1]]; const d=new Date(today); let diff=t-dow; if(diff<=0)diff+=7; d.setDate(d.getDate()+diff); return {date:d, rest:input.slice(nw[0].length).trim()}; }
  const tw = input.match(/^이번\s*주\s*([일월화수목금토])요일\s*/);
  if (tw) { const t=DAY_MAP[tw[1]]; const d=new Date(today); let diff=t-dow; if(diff<=0)diff+=7; d.setDate(d.getDate()+diff); return {date:d, rest:input.slice(tw[0].length).trim()}; }
  const fd = input.match(/^(\d{4})-(\d{2})-(\d{2})\s*/);
  if (fd) return {date:new Date(+fd[1],+fd[2]-1,+fd[3]), rest:input.slice(fd[0].length).trim()};
  const sd = input.match(/^(\d{2})-(\d{2})\s*/);
  if (sd) return {date:new Date(now.getFullYear(),+sd[1]-1,+sd[2]), rest:input.slice(sd[0].length).trim()};
  return null;
}
function parseScheduleInput(text) {
  const p = parseNaturalDate(text.trim());
  if (!p) return null;
  const m = p.rest.match(/^(\d{1,2}):(\d{2})\s+(.+)$/);
  if (!m) return null;
  return {date:p.date, hour:+m[1], minute:+m[2], title:m[3]};
}
function fmt(d) { return new Date(d).toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'}); }
function fmtFull(d) { return new Date(d).toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'}); }
function fmtTime(h,m) { const p=h<12?'AM':'PM'; return `${p} ${h%12||12}:${String(m).padStart(2,'0')}`; }
function fmtMemoTime(d) { return new Date(d).toLocaleString('ko-KR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}); }

function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('nav-'+tab).classList.add('active');
  currentTab = tab;
  renderAll();
}

function addSchedule() {
  const input = document.getElementById('schedInput').value;
  const p = parseScheduleInput(input);
  const errEl = document.getElementById('schedErr');
  if (!p) { errEl.textContent='형식: 내일 10:00 PT상담 · 다음주 토요일 14:00 회의'; errEl.style.display='block'; return; }
  errEl.style.display='none';
  const color = getColorId(p.title);
  schedules.push({...p, date:p.date.toISOString(), id:Date.now(), color});
  if (color==='urgent'||hasTodoIntent(p.title)) {
    todos.push({id:Date.now()+1, text:p.title, status:color==='urgent'?'ASAP':'진행중', from:'일정', date:new Date().toISOString()});
  }
  document.getElementById('schedInput').value='';
  save(); renderAll();
}

function deleteSchedule(id) { schedules=schedules.filter(s=>s.id!==id); save(); renderAll(); }

function addMemo() {
  const text = document.getElementById('memoInput').value.trim();
  if (!text) return;
  memos.unshift({id:Date.now(), text, category:memoCat, pinned:memoPin, date:new Date().toISOString()});
  if (hasTodoIntent(text)) todos.push({id:Date.now()+1, text, status:'진행중', from:'메모', date:new Date().toISOString()});
  document.getElementById('memoInput').value='';
  memoPin=false;
  document.getElementById('pinBtn').textContent='☆ 고정';
  document.getElementById('pinBtn').style.color='var(--text2)';
  save(); renderAll();
}
function deleteMemo(id) { memos=memos.filter(m=>m.id!==id); save(); renderAll(); }
function togglePin(id) { memos=memos.map(m=>m.id===id?{...m,pinned:!m.pinned}:m); save(); renderAll(); }
function toggleMemoPin() {
  memoPin=!memoPin;
  const btn=document.getElementById('pinBtn');
  btn.textContent=(memoPin?'⭐':'☆')+' 고정';
  btn.style.color=memoPin?'var(--yellow)':'var(--text2)';
}
function setMemoCat(cat) { memoCat=cat; renderMemoCatPills(); }

function addTodo() {
  const text=document.getElementById('todoInput').value.trim();
  if (!text) return;
  todos.push({id:Date.now(), text, status:todoPriority, from:'직접', date:new Date().toISOString()});
  document.getElementById('todoInput').value='';
  save(); renderAll();
}
function moveTodo(id,status) { todos=todos.map(t=>t.id===id?{...t,status}:t); save(); renderAll(); }
function deleteTodo(id) { todos=todos.filter(t=>t.id!==id); save(); renderAll(); }
function setTodoPriority(p) { todoPriority=p; renderTodoPriorityPills(); }

function addFocus() {
  const input=document.getElementById('focusInput');
  const text=input.value.trim();
  if (!text||focuses.filter(f=>!f.done).length>=3) return;
  focuses.push({id:Date.now(), text, done:false, date:new Date().toISOString()});
  input.value='';
  save(); renderAll();
}
function toggleFocus(id) { focuses=focuses.map(f=>f.id===id?{...f,done:!f.done}:f); save(); renderAll(); }
function deleteFocus(id) { focuses=focuses.filter(f=>f.id!==id); save(); renderAll(); }

function renderMemoCatPills() {
  const cats=['일반','업무','아이디어','개인'];
  document.getElementById('memoCatPills').innerHTML=cats.map(c=>`<button class="cat-pill ${c===memoCat?'active':'inactive'}" onclick="setMemoCat('${c}')">${c}</button>`).join('');
}
function renderTodoPriorityPills() {
  const priorities=['ASAP','진행중'];
  document.getElementById('todoPriorityPills').innerHTML=priorities.map(p=>{
    const isActive=p===todoPriority;
    const style=isActive&&p==='ASAP'?'style="background:var(--orange);color:#fff;"':'';
    return `<button class="cat-pill ${isActive?'active':'inactive'}" onclick="setTodoPriority('${p}')" ${style}>${p==='ASAP'?'🔥 ASAP':'▶ 진행중'}</button>`;
  }).join('');
}

function renderHome() {
  const now = new Date();
  const todayScheds = schedules.filter(s=>new Date(s.date).toDateString()===now.toDateString()).sort((a,b)=>a.hour*60+a.minute-b.hour*60-b.minute);
  const asapTodos = todos.filter(t=>t.status==='ASAP');

  const todayEl=document.getElementById('homeTodayScheds');
  if (todayScheds.length===0) { todayEl.innerHTML='<p class="empty">오늘 일정이 없어요</p>'; }
  else { todayEl.innerHTML=todayScheds.map(s=>`<div class="briefing-row"><div style="display:flex;align-items:center;gap:8px;"><div style="width:7px;height:7px;border-radius:50%;background:${COLOR[s.color]};flex-shrink:0;"></div><span style="font-size:14px;">${s.title}</span></div><span style="font-size:12px;color:var(--text2);">${fmtTime(s.hour,s.minute)}</span></div>`).join(''); }

  const asapCard=document.getElementById('homeAsapCard');
  if (asapTodos.length>0) {
    asapCard.style.display='block';
    document.getElementById('homeAsapList').innerHTML=asapTodos.map(t=>`<div class="briefing-row"><span style="font-size:14px;">${t.text}</span><button class="btn-ghost" onclick="moveTodo(${t.id},'완료')" style="font-size:11px;">완료</button></div>`).join('');
  } else { asapCard.style.display='none'; }

  const recentMemoCard=document.getElementById('homeRecentMemoCard');
  if (memos.length>0) {
    recentMemoCard.style.display='block';
    document.getElementById('homeRecentMemos').innerHTML=memos.slice(0,2).map(m=>`<div class="briefing-row"><span style="font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px;">${m.text}</span><span class="tag">${m.category}</span></div>`).join('');
  } else { recentMemoCard.style.display='none'; }

  const activeFocuses=focuses.filter(f=>!f.done);
  document.getElementById('focusCount').textContent=`${activeFocuses.length}/3`;
  document.getElementById('focusList').innerHTML=focuses.map(f=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);"><button onclick="toggleFocus(${f.id})" style="font-size:18px;color:${f.done?'var(--blue)':'var(--text2)'};flex-shrink:0;">${f.done?'✓':'○'}</button><span style="flex:1;font-size:14px;text-decoration:${f.done?'line-through':'none'};color:${f.done?'var(--text2)':'var(--text)'};">${f.text}</span><button class="btn-icon" onclick="deleteFocus(${f.id})">×</button></div>`).join('');
  document.getElementById('focusInputArea').style.display=activeFocuses.length<3?'flex':'none';
  const focusMsg=document.getElementById('focusMsg');
  if (focuses.length>0&&focuses.every(f=>f.done)) { focusMsg.style.display='block'; focusMsg.style.color='var(--blue)'; focusMsg.textContent='🎉 오늘 포커스 완료! 수고했어요'; }
  else if (focuses.some(f=>!f.done)&&asapTodos.length>0) { focusMsg.style.display='block'; focusMsg.style.color='var(--orange)'; focusMsg.textContent='👀 포커스 미완료 상태에서 ASAP이 있어요'; }
  else { focusMsg.style.display='none'; }
}

function renderSchedules() {
  const now = new Date();
  const todayScheds = schedules.filter(s=>new Date(s.date).toDateString()===now.toDateString()).sort((a,b)=>a.hour*60+a.minute-b.hour*60-b.minute);
  const upcomingScheds = schedules.filter(s=>new Date(s.date)>now).sort((a,b)=>new Date(a.date)-new Date(b.date));

  document.getElementById('schedEmpty').style.display=schedules.length===0?'block':'none';
  const todayCard=document.getElementById('todaySchedCard');
  if (todayScheds.length>0) { todayCard.style.display='block'; document.getElementById('todaySchedList').innerHTML=todayScheds.map(s=>`<div class="sched-item"><div class="sched-bar" style="background:${COLOR[s.color]};"></div><div style="flex:1;"><p class="sched-title">${s.title}</p><p class="sched-sub">${fmtTime(s.hour,s.minute)}</p></div><button class="btn-icon" onclick="deleteSchedule(${s.id})">×</button></div>`).join(''); } else { todayCard.style.display='none'; }
  const upCard=document.getElementById('upcomingSchedCard');
  if (upcomingScheds.length>0) { upCard.style.display='block'; document.getElementById('upcomingSchedList').innerHTML=upcomingScheds.map(s=>`<div class="sched-item"><div class="sched-bar" style="background:${COLOR[s.color]};"></div><div style="flex:1;"><p class="sched-title">${s.title}</p><p class="sched-sub">${fmt(s.date)} · ${fmtTime(s.hour,s.minute)}</p></div><button class="btn-icon" onclick="deleteSchedule(${s.id})">×</button></div>`).join(''); } else { upCard.style.display='none'; }
}

function renderMemos() {
  const search=document.getElementById('memoSearch').value.toLowerCase();
  const filtered=memos.filter(m=>search===''||m.text.toLowerCase().includes(search)||m.category.includes(search)).sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||new Date(b.date)-new Date(a.date));
  const listCard=document.getElementById('memoListCard');
  const emptyEl=document.getElementById('memoEmpty');
  if (filtered.length===0) { listCard.style.display='none'; emptyEl.style.display='block'; emptyEl.textContent=search?'검색 결과가 없어요':'저장된 메모가 없어요'; }
  else { listCard.style.display='block'; emptyEl.style.display='none'; document.getElementById('memoList').innerHTML=filtered.map(m=>`<div class="memo-item"><div class="memo-header"><div style="display:flex;align-items:center;gap:6px;">${m.pinned?'<span style="font-size:14px;">⭐</span>':''}<span class="tag">${m.category}</span></div><div style="display:flex;gap:4px;"><button class="btn-icon" onclick="togglePin(${m.id})" style="font-size:14px;">${m.pinned?'⭐':'☆'}</button><button class="btn-icon" onclick="deleteMemo(${m.id})">×</button></div></div><p class="memo-text">${m.text}</p><p class="memo-date">${fmtMemoTime(m.date)}</p></div>`).join(''); }
}

function renderTodos() {
  const asap=todos.filter(t=>t.status==='ASAP');
  const active=todos.filter(t=>t.status==='진행중');
  const done=todos.filter(t=>t.status==='완료');
  document.getElementById('todoEmpty').style.display=todos.length===0?'block':'none';

  const renderList=(items,container,isDone)=>{ container.innerHTML=items.map(t=>`<div class="todo-item ${isDone?'todo-done':''}"><button onclick="moveTodo(${t.id},'${isDone?'진행중':'완료'}')" style="font-size:18px;color:${isDone?'#aaa':'var(--text2)'};flex-shrink:0;margin-top:1px;">${isDone?'✓':'○'}</button><div style="flex:1;"><p class="todo-text">${t.text}${t.from!=='직접'?`<span class="todo-from">${t.from}</span>`:''}</p></div><div class="todo-actions">${!isDone&&t.status==='진행중'?`<button class="btn-ghost" style="font-size:11px;color:var(--orange);" onclick="moveTodo(${t.id},'ASAP')">ASAP↑</button>`:''}${!isDone&&t.status==='ASAP'?`<button class="btn-ghost" style="font-size:11px;" onclick="moveTodo(${t.id},'진행중')">진행</button>`:''}<button class="btn-icon" onclick="deleteTodo(${t.id})">×</button></div></div>`).join(''); };

  const asapSec=document.getElementById('asapSection'); if(asap.length>0){asapSec.style.display='block';document.getElementById('asapCount').textContent=asap.length;renderList(asap,document.getElementById('asapList'),false);}else{asapSec.style.display='none';}
  const activeSec=document.getElementById('activeSection'); if(active.length>0){activeSec.style.display='block';document.getElementById('activeCount').textContent=active.length;renderList(active,document.getElementById('activeList'),false);}else{activeSec.style.display='none';}
  const doneSec=document.getElementById('doneSection'); if(done.length>0){doneSec.style.display='block';document.getElementById('doneCount').textContent=done.length;renderList(done,document.getElementById('doneList'),true);}else{doneSec.style.display='none';}
}

function renderAll() {
  renderHome();
  renderSchedules();
  renderMemos();
  renderTodos();
  renderMemoCatPills();
  renderTodoPriorityPills();
}

const now = new Date();
const greeting = now.getHours()<12?'굿모닝':now.getHours()<18?'안녕하세요':'굿이브닝';
document.getElementById('headerDate').textContent = now.toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'long'});
document.getElementById('headerTitle').textContent = `${greeting}, 다니엘 👋`;
document.getElementById('fortuneText').textContent = '🔮 ' + FORTUNES[Math.floor(Math.random()*FORTUNES.length)];

renderAll();
</script>
